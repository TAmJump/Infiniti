<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません｜株式会社Next Innovation</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{--paper:#f6f3ec;--ink:#1b1916;--stone:#73695c;--coral:#cf4747;--line:#ddd4c5}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--paper);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;font-family:'Noto Serif JP',serif;font-weight:300}
  .num{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:clamp(72px,16vw,160px);line-height:1;letter-spacing:-.03em}
  .num em{color:var(--coral)}
  .dash{width:48px;height:1px;background:var(--coral);margin:28px auto}
  p{font-size:15px;line-height:2;color:var(--stone);margin-bottom:34px}
  a{display:inline-flex;align-items:center;gap:12px;font-family:'Fraunces',serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--paper);background:var(--ink);padding:16px 34px;text-decoration:none;transition:background .3s,gap .3s}
  a:hover{background:var(--coral);gap:18px}
  a .arr{font-style:italic}
</style>
</head>
<body>
  <div>
    <div class="num">4<em>0</em>4</div>
    <div class="dash"></div>
    <p>お探しのページは見つかりませんでした。<br>アドレスが変更されたか、削除された可能性があります。</p>
    <a href="/">トップへ戻る <span class="arr">&rarr;</span></a>
  </div>
</body>
</html>
